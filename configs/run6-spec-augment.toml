[train]
# Run 6: Cosine schedule + SpecAugment (resume from run5 best)
embed_dim = 256
projection_hidden_dim = 512
projection_depth = 3
projection_dropout = 0.1
temperature_init = 0.07

text_encoder_name = "all-MiniLM-L6-v2"
audio_encoder_name = "MIT/ast-finetuned-audioset-10-10-0.4593"

unfreeze_audio_layers = 2
encoder_learning_rate = 1e-5
max_grad_norm = 1.0

lr_schedule = "cosine"

batch_size = 100
learning_rate = 3e-4
weight_decay = 0.01
warmup_steps = 100
num_epochs = 300
eval_interval = 5
grad_accumulation_steps = 4

spec_augment = true
spec_aug_freq_masks = 2
spec_aug_freq_width = 27
spec_aug_time_masks = 2
spec_aug_time_width = 100

n_mels = 128
sample_rate = 16000
max_audio_seconds = 10.0

data_dir = "data"
cache_dir = "data/cache"
log_dir = "runs/run6-spec-augment"
checkpoint_dir = "checkpoints/run6-spec-augment"

device = "auto"
