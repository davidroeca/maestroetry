[train]
# Run 3: Unfreeze top 2 AST layers with differential LR
embed_dim = 256
projection_hidden_dim = 512
projection_depth = 3
projection_dropout = 0.1
temperature_init = 0.07

text_encoder_name = "all-MiniLM-L6-v2"
audio_encoder_name = "MIT/ast-finetuned-audioset-10-10-0.4593"

unfreeze_audio_layers = 2
encoder_learning_rate = 1e-5
max_grad_norm = 1.0

batch_size = 100
learning_rate = 3e-4
weight_decay = 0.01
warmup_steps = 100
num_epochs = 200
eval_interval = 5
grad_accumulation_steps = 4

n_mels = 128
sample_rate = 16000
max_audio_seconds = 10.0

data_dir = "data"
cache_dir = "data/cache"
log_dir = "runs/run3-unfreeze-2"
checkpoint_dir = "checkpoints/run3-unfreeze-2"

device = "auto"
