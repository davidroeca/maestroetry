[train]
# Run 14: Unfrozen bge-base + stronger regularization + early stopping
#
# Builds on run 13 (which peaked at ~0.029 eval R@1 around epoch 50
# then overfit). Changes vs run 13:
#   - Lower encoder LR: 5e-6 (was 1e-5) to slow text encoder overfitting
#   - Higher dropout: 0.3 (was 0.2)
#   - Early stopping: patience 10 (= 50 epochs at eval_interval=5)

# Model architecture
embed_dim = 256
projection_hidden_dim = 512
projection_depth = 2
projection_dropout = 0.3
temperature_init = 0.07

# Encoder names
text_encoder_name = "BAAI/bge-base-en-v1.5"
audio_encoder_name = "MIT/ast-finetuned-audioset-10-10-0.4593"

# Encoder fine-tuning
unfreeze_audio_layers = 2
unfreeze_text_layers = 2
encoder_learning_rate = 5e-6
max_grad_norm = 1.0
hard_negative_weight = 1.0

# LR schedule
lr_schedule = "cosine"

# Training
batch_size = 64
learning_rate = 3e-4
weight_decay = 0.01
warmup_steps = 200
num_epochs = 300
eval_interval = 5
early_stopping_patience = 10
grad_accumulation_steps = 2

# SpecAugment
spec_augment = true
spec_aug_freq_masks = 2
spec_aug_freq_width = 27
spec_aug_time_masks = 2
spec_aug_time_width = 100

# Audio preprocessing
n_mels = 128
sample_rate = 16000
max_audio_seconds = 10.0

# Paths
data_dir = "data"
cache_dir = "data/cache"
log_dir = "runs/run14"
checkpoint_dir = "checkpoints/run14"

# Device
device = "auto"
