schema_version: "0.7"
domain: research
tier: full

intent: |
  Fine-tuning pipeline for CLAP on LP-MusicCaps + Jamendo data. Symmetric
  InfoNCE loss on CLAP's 512-dim text and audio features, training loop with
  AdamW and cosine LR schedule, differential learning rates for unfrozen CLAP
  layers vs the temperature scalar, and Recall@k evaluation on held-out tracks.

behaviors:
  - name: info_nce_loss
    given: L2-normalized text and audio embeddings of shape (N, 512) and a temperature scalar
    then: returns scalar loss equal to the mean of text->audio and audio->text cross-entropy
  - name: train_one_epoch
    given: a ContrastiveModel, dataloader, optimizer, and scheduler
    then: runs one epoch of training and returns the mean loss
  - name: train
    given: a TrainConfig with all hyperparameters and an optional checkpoint path to resume from
    then: loads CLAP model, caches 48kHz waveforms if not already cached, builds
      ContrastiveModel, trains for num_epochs with TensorBoard logging for loss
      and Recall@k; uses separate train (split="train") and eval (split="eval",
      no augmentation) dataloaders so metrics measure generalization on held-out
      tracks; evaluates every eval_interval epochs and always on the final epoch;
      saves a single best.pt checkpoint (overwritten when t2a_R@1 improves);
      stops early when eval R@1 has not improved for early_stopping_patience
      eval intervals; applies differential learning rates (encoder_learning_rate
      for unfrozen CLAP layers, learning_rate for temperature) and gradient
      clipping via max_grad_norm
  - name: save_checkpoint
    given: a model, optimizer, scheduler, epoch number, and output path
    then: persists trainable parameter state (unfrozen CLAP layers and temperature),
      optimizer state, scheduler state, and epoch number; frozen parameters are
      excluded to keep checkpoints small
  - name: load_checkpoint
    given: a checkpoint file path, model, optimizer, scheduler, and optional
      model_weights_only flag
    then: filters checkpoint keys to only currently-trainable parameters (strict=False);
      when model_weights_only is False, also restores optimizer/scheduler state
      and returns the next epoch; when True, skips optimizer/scheduler and returns epoch 0
  - name: recall_at_k
    given: paired text and audio embeddings and k values
    then: returns dict with Recall@k metrics for both retrieval directions in [0.0, 1.0]

constraints:
  - InfoNCE loss is symmetric (both directions averaged)
  - "Optimizer: AdamW; encoder_learning_rate for unfrozen CLAP layers (default 1e-6),
    learning_rate for temperature (default 3e-4); cosine LR schedule with warmup"
  - "Default: top 2 layers of each CLAP tower unfrozen; gradient clipping max_grad_norm=1.0"
  - TensorBoard logging for loss and Recall@k metrics
  - Recall@k metrics logged every eval_interval epochs and on the final epoch
  - Early stopping: patience counted in eval intervals without improvement in t2a_R@1;
    0 = disabled
  - No SpecAugment (raw waveform input; CLAP handles its own audio preprocessing)

invariants:
  - Random embeddings produce loss approximately equal to log(batch_size)
  - Recall@k values are in [0.0, 1.0]
  - Frozen CLAP parameters are never modified during training

artifacts:
  code:
    - path: "src/maestroetry/loss.py"
      role: InfoNCE loss implementation
    - path: "src/maestroetry/train.py"
      role: training loop
    - path: "src/maestroetry/evaluate.py"
      role: Recall@k evaluation metrics
    - path: "src/maestroetry/config.py"
      role: training configuration dataclass and TOML loader
  configs:
    - path: "configs/default.toml"
      role: default hyperparameters
  docs:
    - path: "docs/TRAINING_LOG.md"
      role: experiment history and results across training runs
  tests:
    - path: "tests/test_loss.py"
      role: InfoNCE loss tests
    - path: "tests/test_config.py"
      role: configuration tests

dependencies:
  - $ref: "./encoders.spec.yaml"
    relationship: training uses CLAP encoders for the forward pass
  - $ref: "./model.spec.yaml"
    relationship: training optimizes ContrastiveModel parameters
  - $ref: "./data-pipeline.spec.yaml"
    relationship: training loads 48kHz waveforms from the dataset
