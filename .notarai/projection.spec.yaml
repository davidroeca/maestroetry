schema_version: "0.7"
domain: research
tier: full

intent: |
  Trainable projection heads that map encoder outputs into the shared
  256-dim embedding space, plus the ContrastiveModel that wires encoders
  and projection heads together with a learnable temperature.

behaviors:
  - name: project_embeddings
    given: encoder output of shape (N, d_in)
    then: returns L2-normalized embeddings of shape (N, 256) via a
      configurable-depth MLP with optional dropout; layer naming uses
      linear1 / linear_mid* / linear2 for checkpoint compatibility
  - name: contrastive_forward
    given: a list of text strings and a batch of spectrograms
    then: returns (text_embeds, audio_embeds, temperature) with embeds
      of shape (N, 256); when finetune_audio is True, gradients flow
      through audio encoder (no detach)
  - name: get_trainable_params
    given: a ContrastiveModel and an optional encoder_lr
    then: returns trainable parameters; when encoder_lr is provided and
      the model is fine-tuning audio, returns param groups with
      differential learning rates

constraints:
  - "Projection architecture: Linear(d_in, d_hidden) -> ReLU -> [Dropout]
    -> [Linear(d_hidden, d_hidden) -> ReLU -> Dropout] x (depth-2) ->
    Linear(d_hidden, d_out) -> L2 norm; configurable via projection_depth
    and projection_dropout"
  - Output embeddings must be L2-normalized to unit length
  - "finetune_audio flag on ContrastiveModel controls whether audio
    encoder gradients flow through (conditionally skips .detach())"

invariants:
  - Output shape is always (batch_size, 256)
  - Output vectors have unit L2 norm
  - Effective temperature is always a positive scalar; stored as log_temperature
    (nn.Parameter, unbounded real) and computed as log_temperature.exp().clamp(0.01, 100.0)

artifacts:
  code:
    - path: "src/maestroetry/projection.py"
      role: projection head and contrastive model implementation
  tests:
    - path: "tests/test_projection.py"
      role: projection head tests

dependencies:
  - $ref: "./encoders.spec.yaml"
    relationship: projection heads consume encoder outputs
