schema_version: "0.7"
domain: research
tier: full

intent: |
  Trainable projection heads that map encoder outputs into the shared
  256-dim embedding space, plus the ContrastiveModel that wires frozen
  encoders and projection heads together with a learnable temperature.
  Projection heads are the only trainable components in the system.

behaviors:
  - name: project_embeddings
    given: encoder output of shape (N, d_in)
    then: returns L2-normalized embeddings of shape (N, 256) via Linear(d_in, 512) -> ReLU -> Linear(512, 256) -> L2 norm
  - name: contrastive_forward
    given: a list of text strings and a batch of spectrograms
    then: returns (text_embeds, audio_embeds, temperature) with embeds of shape (N, 256)
  - name: get_trainable_params
    given: a ContrastiveModel instance
    then: returns only projection head parameters and temperature, not frozen encoder parameters

constraints:
  - "Projection architecture: Linear(d_in, 512) -> ReLU -> Linear(512, 256) -> L2 norm"
  - Output embeddings must be L2-normalized to unit length
  - Only projection head parameters and temperature are trainable

invariants:
  - Output shape is always (batch_size, 256)
  - Output vectors have unit L2 norm
  - Effective temperature is always a positive scalar; stored as log_temperature
    (nn.Parameter, unbounded real) and computed as log_temperature.exp().clamp(0.01, 100.0)

artifacts:
  code:
    - path: "src/maestroetry/projection.py"
      role: projection head and contrastive model implementation
  tests:
    - path: "tests/test_projection.py"
      role: projection head tests

dependencies:
  - $ref: "./encoders.spec.yaml"
    relationship: projection heads consume encoder outputs
