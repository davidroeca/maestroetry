schema_version: "0.7"
domain: research
tier: full

intent: |
  Fully static SPA (deployable to GitHub Pages, no server) demonstrating
  text-to-music search and similar track finding over 15 curated
  CC-licensed tracks (Kevin MacLeod / Incompetech, CC BY 3.0) that are
  entirely outside the training and eval datasets, so the demo tests
  true generalization on unseen audio. Audio embeddings are pre-computed
  offline by export_web_data.py. The text encoder runs in-browser via
  Transformers.js using a quantized CLAP model if available; if no
  Transformers.js-compatible CLAP variant exists, a fixed query vocabulary
  is pre-computed offline and free-text search is replaced by prompt chips.

behaviors:
  - name: text_search
    given: a text query describing mood, instrumentation, or character
    then: encodes via Transformers.js CLAP text encoder (preferred) or
      selects the nearest pre-computed query embedding (fallback),
      ranks all 15 tracks by cosine similarity, displays results with scores
  - name: similar_finder
    given: a selected track from the 15-track corpus
    then: ranks remaining tracks by embedding distance, displays results
      immediately with no model loading required
  - name: audio_playback
    given: any visible track card
    then: plays the corresponding MP3 clip via HTML5 audio element
  - name: model_loading
    given: the page loads for the first time
    then: shows a loading overlay with download progress while
      Transformers.js fetches the quantized CLAP model from the CDN;
      similar finder is usable immediately without waiting;
      if running in pre-computed fallback mode, no model loading is needed

constraints:
  - Text encoder runs in a Web Worker to keep the main thread responsive
  - Audio embeddings are pre-computed by export_web_data.py and served as static JSON
  - Output must be a fully static site with no server-side rendering at runtime
  - Embedding dimension is 512 (CLAP native output); no projection head
  - "Open question: whether a Transformers.js-compatible quantized CLAP model
    exists (e.g. Xenova/larger_clap_music or equivalent); if not, fall back to
    pre-computed prompt chip embeddings and remove free-text input"

invariants:
  - All embeddings are L2-normalized; similarity is dot product
  - Audio and text embeddings are produced by the same CLAP model used for training

decisions:
  - date: "2026-04-07"
    choice: Target CLAP text encoder in-browser; fall back to pre-computed chips
    rationale: >
      Switching to CLAP removes the MiniLM text encoder and TypeScript projection
      head. The ideal replacement is a quantized CLAP text encoder via Transformers.js
      to preserve free-text search. If no compatible quantized variant exists,
      pre-computing embeddings for a fixed prompt chip vocabulary is the fallback.
      This decision should be revisited once training with CLAP is validated and
      Transformers.js model availability is confirmed.
  - date: "2026-03-30"
    choice: Pre-compute audio embeddings offline, run only text encoder in-browser
    rationale: >
      The CLAP audio encoder is too large for browser inference. Pre-computing
      and serving audio embeddings as static JSON keeps the page lightweight.
  - date: "2026-03-30"
    choice: Web Worker for Transformers.js
    rationale: >
      Transformers.js model loading blocks the main thread for several seconds.
      Running it in a Web Worker keeps the UI responsive.
  - date: "2026-03-31"
    choice: Demo corpus uses CC-licensed tracks entirely outside the training data
    rationale: >
      Demoing with training tracks would only show memorization. Using external
      CC tracks (Kevin MacLeod / Incompetech) tests real generalization on
      completely unseen audio.

artifacts:
  code:
    - path: "web/src/**/*.{ts,svelte}"
      role: SvelteKit SPA source
    - path: "web/src/lib/inference/worker.ts"
      role: Web Worker for Transformers.js CLAP text encoding
    - path: "web/src/lib/inference/similarity.ts"
      role: dot product similarity scoring
    - path: "web/src/lib/stores/model.svelte.ts"
      role: model loading state and encodeText()
    - path: "web/src/lib/stores/tracks.ts"
      role: track data loading, search, and similar finder
    - path: "export_web_data.py"
      role: offline export of audio embeddings (and prompt chip embeddings if fallback)

dependencies:
  - $ref: "./encoders.spec.yaml"
    relationship: web demo uses the same CLAP model for text encoding as the training pipeline
