schema_version: "0.7"
domain: research
tier: full

intent: |
  Audio-to-mel-spectrogram conversion, spectrogram caching as .pt tensor
  files, and a PyTorch Dataset class for loading paired (spectrogram, text)
  samples from a CSV manifest for training.

behaviors:
  - name: audio_to_mel_spectrogram
    given: a path to an audio file, n_mels, sample rate, and max duration
    then: returns a 2D mel spectrogram tensor of shape (time_frames, n_mels),
      padded/truncated to 1024 time frames and normalized for AST
  - name: cache_spectrograms
    given: a directory of audio files and a cache directory
    then: converts all audio files to mel spectrograms and saves as .pt files in the cache directory
  - name: apply_spec_augment
    given: a spectrogram tensor and frequency/time mask parameters
    then: returns a cloned spectrogram with random frequency and time strips
      zeroed out (SpecAugment masking); the original tensor is never modified
  - name: AudioTextDataset
    given: a CSV manifest with audio_path and text columns, a cache directory,
      and optional SpecAugment parameters
    then: returns a Dataset that yields (spectrogram_tensor, text_string) tuples;
      when augment is enabled, applies SpecAugment masking to each spectrogram
      on load (operating on clones, so cached files are unmodified)

constraints:
  - Mel spectrograms use 128 mel bins by default
  - Audio resampled to consistent sample rate before conversion
  - Cached spectrograms stored as .pt tensor files
  - Dataset reads from a CSV manifest with audio_path and text columns
  - Manifest includes a source column (lp_musiccaps or jamendo) to distinguish data origin
  - "Two-tier data strategy: LP-MusicCaps provides LLM-generated captions (~3K tracks),
    Jamendo provides programmatic captions from genre/instrument/mood tags (~10.5K tracks)"

invariants:
  - Spectrogram output is a 2D tensor (time_frames, n_mels) of shape (1024, 128)
  - Each Dataset item returns a (spectrogram_tensor, text_string) tuple
  - Cached spectrograms match their source audio content

artifacts:
  code:
    - path: "src/maestroetry/dataset.py"
      role: spectrogram conversion, caching, and dataset class
  data:
    - path: "data/**"
      role: audio files and cached spectrograms

dependencies:
  - $ref: "./encoders.spec.yaml"
    relationship: spectrograms are consumed by the audio encoder
