schema_version: "0.7"
domain: research
tier: full

intent: |
  Raw waveform caching and a PyTorch Dataset class for loading paired
  (waveform, text) samples from a CSV manifest for CLAP fine-tuning.
  Waveforms are resampled to 48kHz and padded/truncated to a fixed
  duration, then cached as .pt tensors to avoid repeated disk I/O.

behaviors:
  - name: audio_to_waveform
    given: a path to an audio file, a sample rate (48kHz), and max duration
    then: loads via librosa, resamples, truncates or zero-pads to exactly
      max_seconds of audio, returns a (max_samples,) 1-D float tensor
  - name: cache_waveforms
    given: a directory of audio files and a cache directory
    then: converts all audio files to fixed-length waveforms at 48kHz,
      saves each as a .pt file with a sample-rate suffix (e.g. _wav48000);
      skips files that are already cached
  - name: AudioTextDataset
    given: a CSV manifest with audio_path and text columns, a cache directory,
      an optional split ("train", "eval", or None), and a waveform sample rate
    then: returns a Dataset that yields (waveform_tensor, text_string) tuples
      and exposes a track_ids attribute for UniqueAudioBatchSampler; when split
      is set, partitions by unique audio track so all caption variants for a
      track stay together; Jamendo tracks are always train-only
  - name: UniqueAudioBatchSampler
    given: a list of per-row track IDs and a batch size
    then: yields batches where each audio track appears at most once;
      picks one caption variant per track at random each epoch so all
      variants are seen over time

constraints:
  - Waveforms are resampled to 48kHz (CLAP's required sample rate)
  - Fixed output length: pad or truncate to max_audio_seconds (default 10s)
  - Cached waveforms stored as .pt tensor files with a _wav{sr} suffix
  - Dataset reads from a CSV manifest with audio_path and text columns
  - Manifest includes a source column (lp_musiccaps or jamendo)
  - "Train/eval split is by unique audio track, not by row (seed=42, 15% eval)"
  - "Eval split drawn only from lp_musiccaps; Jamendo tracks are train-only"
  - "Two-tier data: LP-MusicCaps (~3K tracks, 4 caption variants each),
    Jamendo (~10.5K tracks, programmatic captions); total ~22-25K training pairs"

invariants:
  - Each Dataset item returns a (waveform_tensor, text_string) tuple
  - Waveform tensor shape is (max_samples,) where max_samples = sr * max_seconds
  - Cached waveforms match their source audio content

artifacts:
  code:
    - path: "src/maestroetry/dataset.py"
      role: waveform conversion, caching, and dataset class
  data:
    - path: "data/**"
      role: audio files and cached waveforms

dependencies:
  - $ref: "./encoders.spec.yaml"
    relationship: waveforms are consumed by the CLAP audio encoder
