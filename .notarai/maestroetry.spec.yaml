schema_version: "0.7"
domain: research
tier: full

intent: |
  Cross-modal contrastive text-audio retrieval system inspired by CLIP.
  Aligns text (poems, lyrics, descriptions) and audio (songs, clips) in a
  shared 256-dimensional embedding space using frozen pretrained encoders
  and trainable projection heads with InfoNCE loss. Given a poem, find the
  song that matches its mood; given a song, find the text that describes it.

behaviors:
  - name: text_to_audio_retrieval
    given: a text query (poem, lyrics, or description) and a corpus of audio embeddings
    then: returns audio items ranked by cosine similarity, with matched items ranked highest
  - name: audio_to_text_retrieval
    given: an audio query and a corpus of text embeddings
    then: returns text items ranked by cosine similarity, with matched items ranked highest
  - name: contrastive_training
    given: a batch of N paired (text, audio) examples
    then: InfoNCE loss drives matched pairs to high cosine similarity and unmatched pairs apart
  - name: ingest_lp_musiccaps
    given: a data directory, optional max_samples limit, dataset split, and
      optional all_captions flag
    then: loads LP-MusicCaps-MTT from HuggingFace, by default picks one of four
      caption variants at random per track; when all_captions is True, emits one
      row per non-null variant (up to 4x more training pairs); writes audio to
      16kHz mono WAV and returns manifest rows with source=lp_musiccaps
  - name: ingest_jamendo
    given: a data directory and optional max_samples limit
    then: loads MTG-Jamendo from HuggingFace, generates descriptive captions
      from genre/instrument/mood_theme tags using natural-language templates,
      writes audio to 16kHz mono WAV, and returns manifest rows with
      source=jamendo
  - name: ingest
    given: a data directory, configuration options for both data sources, and
      optional lp_all_captions flag
    then: orchestrates ingest_lp_musiccaps and ingest_jamendo, deduplicates
      rows by caption text to avoid InfoNCE false negatives, and produces a
      unified manifest.csv with audio_path, text, and source columns;
      lp_all_captions is forwarded to ingest_lp_musiccaps to control caption
      expansion

constraints:
  - Text encoder is always frozen; top 2 audio encoder layers are unfrozen
    by default for fine-tuning at a differential learning rate
  - Shared embedding space is 256-dimensional with L2 normalization
  - Must be trainable on a single consumer GPU or free Colab instance
  - Projection heads and temperature are always trainable; unfrozen audio
    encoder layers train at encoder_learning_rate with gradient clipping

invariants:
  - Matched text-audio pairs have higher cosine similarity than unmatched pairs after training
  - All embeddings in the shared space are L2-normalized to unit length
  - Frozen encoder weights are never modified during training

decisions:
  - date: "2026-03-29"
    choice: Use all LP-MusicCaps caption variants by default (multi-caption ingestion)
    rationale: >
      Expanding from 1 random caption per LP-MusicCaps track to all 4 variants
      grew the dataset from ~13.5K to ~22-25K pairs. This was the single largest
      factor in improving R@1 from ~0.29 to ~0.99. Combined with cosine LR
      schedule, SpecAugment, and unfrozen top 2 AST layers.
  - date: "2026-03-18"
    choice: Replace SDD+FMA ingest with LP-MusicCaps-MTT + MTG-Jamendo
    rationale: >
      SDD is eval-only and shouldn't be used for training. FMA captions are
      low-quality templates. LP-MusicCaps provides ~3K tracks with LLM-generated
      captions and bundled audio. MTG-Jamendo provides ~10.5K tracks with
      genre/instrument/mood tags for programmatic caption generation. All
      CC-licensed and fetched via HuggingFace datasets library.
  - date: "2026-03-16"
    choice: Replace MusicCaps/YouTube ingest with Song Describer Dataset + FMA
    rationale: >
      YouTube-based ingest via yt-dlp is unreliable due to rate limiting,
      video takedowns, and slow downloads. SDD provides ~1,000 human-written
      captions mapped to FMA track IDs, and FMA offers CC-licensed audio
      directly downloadable from archive.org. Programmatic captions from
      FMA metadata provide volume alongside SDD's quality anchors.
  - date: "2026-03-14"
    choice: Use frozen pretrained encoders with trainable projection heads only
    rationale: >
      Freezing pretrained encoders keeps compute requirements low,
      focuses training on alignment, and avoids catastrophic forgetting.
  - date: "2026-03-14"
    choice: Symmetric InfoNCE loss with in-batch negatives
    rationale: >
      InfoNCE frames alignment as classification over batch negatives,
      providing strong gradient signal without requiring a separate negative mining step.
  - date: "2026-03-14"
    choice: Learnable temperature parameter initialized at 0.07
    rationale: >
      Letting the model learn its own temperature allows it to find the
      optimal softmax sharpness during training.

artifacts:
  code:
    - path: "src/maestroetry/**/*.py"
      role: primary implementation
  tests:
    - path: "tests/**/*.py"
      role: unit and integration tests
  configs:
    - path: "configs/*.toml"
      role: training hyperparameter configs
  docs:
    - path: "docs/TRAINING_LOG.md"
      role: experiment history and results across training runs

subsystems:
  - $ref: "./encoders.spec.yaml"
  - $ref: "./projection.spec.yaml"
  - $ref: "./data-pipeline.spec.yaml"
  - $ref: "./training.spec.yaml"
  - $ref: "./web-demo.spec.yaml"
